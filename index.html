<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMoby | دخول سريع</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6e1414; --bg: #fdfdfd; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .auth-container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 90%; max-width: 400px; text-align: center; }
        .logo { font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 20px; }
        
        .phone-group { display: flex; direction: ltr; gap: 8px; margin-bottom: 15px; }
        .country-code { width: 85px; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-weight: bold; background: #f9f9f9; text-align: center; }
        .phone-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; }
        
        .btn-send { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-send:disabled { background: #ccc; }
        
        #otp-section { display: none; margin-top: 20px; }
        .otp-input { width: 100%; letter-spacing: 10px; font-size: 24px; text-align: center; margin-bottom: 15px; }
        
        /* إخفاء علامة ريكابتشا قدر الإمكان */
        .grecaptcha-badge { visibility: hidden !important; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo">iMoby</div>
    <p id="status-msg" style="color: #666; margin-bottom: 20px;">سجل دخولك برقم الجوال</p>

    <!-- واجهة إدخال الرقم -->
    <div id="phone-section">
        <div class="phone-group">
            <select id="country-code" class="country-code">
                <option value="+20">+20 🇪🇬</option>
                <option value="+966">+966 🇸🇦</option>
                <option value="+971">+971 🇦🇪</option>
                <option value="+965">+965 🇰🇼</option>
            </select>
            <input type="tel" id="phone-number" class="phone-input" placeholder="10xxxxxxxx" maxlength="10">
        </div>
        <button id="send-btn" class="btn-send" onclick="onSignInSubmit()">إرسال كود التحقق</button>
    </div>

    <!-- واجهة إدخال الكود -->
    <div id="otp-section">
        <input type="number" id="otp-code" class="phone-input otp-input" placeholder="------">
        <button class="btn-send" onclick="verifyCode()">تأكيد الدخول</button>
        <p onclick="location.reload()" style="font-size: 12px; color: #888; margin-top: 15px; cursor: pointer;">تغيير الرقم</p>
    </div>

    <!-- حاوي الـ ReCaptcha المخفي -->
    <div id="recaptcha-container"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCr4T8GLRxtf_6LNrokjKvmBOwSkuGO5yQ",
        authDomain: "hamsa-6009e.firebaseapp.com",
        projectId: "hamsa-6009e",
        storageBucket: "hamsa-6009e.firebasestorage.app",
        messagingSenderId: "998163671039",
        appId: "1:998163671039:web:d1930ea5b71a3a3fc729ca"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    auth.languageCode = 'ar';

    // إعداد الريكابتشا المخفية
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        'size': 'invisible',
        'callback': (response) => {
            // سيتم استدعاؤها تلقائياً عند الحاجة
        }
    });

    window.onSignInSubmit = function() {
        const code = document.getElementById('country-code').value;
        let num = document.getElementById('phone-number').value;
        
        // إزالة الصفر من البداية إذا وجد
        if (num.startsWith('0')) {
            num = num.substring(1);
        }

        if (num.length < 7) return alert("الرقم غير مكتمل");

        const fullPhoneNumber = code + num;
        const appVerifier = window.recaptchaVerifier;

        document.getElementById('send-btn').disabled = true;
        document.getElementById('status-msg').innerText = "جاري الإرسال...";

        signInWithPhoneNumber(auth, fullPhoneNumber, appVerifier)
            .then((confirmationResult) => {
                window.confirmationResult = confirmationResult;
                document.getElementById('phone-section').style.display = 'none';
                document.getElementById('otp-section').style.display = 'block';
                document.getElementById('status-msg').innerText = "أدخل الكود المرسل لـ " + fullPhoneNumber;
            }).catch((error) => {
                alert("خطأ: " + error.message);
                document.getElementById('send-btn').disabled = false;
                document.getElementById('status-msg').innerText = "فشل الإرسال، حاول مجدداً";
            });
    }

    window.verifyCode = function() {
        const code = document.getElementById('otp-code').value;
        window.confirmationResult.confirm(code).then((result) => {
            alert("تم تسجيل الدخول بنجاح!");
            // هنا يمكنك توجيه المستخدم لصفحة المتجر الرئيسية
            window.location.href = "shop.html"; 
        }).catch((error) => {
            alert("الكود غير صحيح، حاول مرة أخرى");
        });
    }
</script>

</body>
</html>
