<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMoby | النسخة الاحترافية الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- إضافة مكتبة الرسائل الاحترافية -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root{ --primary:#6e1414; --primary-light:#a61e1e; --accent:#d4a017; --bg-cream:#f8f9fa; --white:#ffffff; --shadow:0 8px 25px rgba(0,0,0,0.06); --radius-md:22px; }
        *{ box-sizing:border-box; margin:0; padding:0; font-family:'Tajawal',sans-serif; -webkit-tap-highlight-color: transparent; }
        body{ background:var(--bg-cream); padding-bottom: 140px; overflow-x: hidden; color: #2d3436; }

        /* شاشة انقطاع الإنترنت */
        #offline-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        /* Header & Sidebar */
        header{ background: linear-gradient(135deg, var(--primary), var(--primary-light)); padding:20px; border-radius:0 0 30px 30px; color:white; display:flex; justify-content: space-between; align-items:center; position: sticky; top: 0; z-index: 1001; box-shadow: 0 4px 20px rgba(110, 20, 20, 0.2); }
        .sidebar { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: #fff; z-index: 2005; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.active { right: 0; }
        .side-profile { background: linear-gradient(180deg, var(--primary), #4a0d0d); padding: 45px 20px 25px; color: white; text-align: center; border-radius: 0 0 25px 25px; }
        .side-profile img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); margin-bottom: 12px; background: #fff; object-fit: cover; }
        .side-menu { flex: 1; padding: 20px 10px; }
        .side-link { display: flex; align-items: center; padding: 15px 20px; margin-bottom: 5px; border-radius: 15px; color: #444; font-weight: 700; cursor: pointer; gap: 15px; }
        .side-footer { padding: 20px; text-align: center; border-top: 1px solid #eee; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2000; backdrop-filter: blur(4px); }

        /* المدخلات */
        input[type="text"], input[type="tel"], input[type="number"], select { text-align: center !important; font-weight: 800 !important; font-size: 16px !important; }

        /* Filters */
        .filter-container { position: sticky; top: 80px; z-index: 1000; background: var(--bg-cream); padding: 10px 0; }
        .search-wrapper { padding: 0 15px 15px; }
        .search-box { width: 100%; padding: 15px 22px; border-radius: 18px; border: none; outline: none; background: #fff; box-shadow: var(--shadow); }
        .filter-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 0 15px 10px; scrollbar-width: none; }
        .f-pill { background: #fff; padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 800; color: #636e72; white-space: nowrap; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1.5px solid transparent; }
        .f-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Bottom Sheet */
        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2100; display: none; align-items: flex-end; }
        .bottom-sheet { background: white; width: 100%; height: 75%; border-radius: 35px 35px 0 0; padding: 25px; overflow-y: auto; position: relative; transform: translateY(100%); transition: 0.4s ease; }
        .bottom-sheet.show { transform: translateY(0); }
        .sheet-gallery { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .sheet-gallery img { width: 85px; height: 85px; border-radius: 15px; object-fit: contain; background: #f9f9f9; border: 1px solid #eee; cursor: zoom-in; }

        /* Products & History */
        .card-item { background:white; border-radius:var(--radius-md); padding:15px; margin: 0 15px 15px; box-shadow:var(--shadow); display: flex; align-items: center; gap: 15px; }
        .product-img { width: 85px; height: 85px; border-radius: 18px; object-fit: contain; background: #fafafa; }
        .qty-controls { display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 6px; border-radius: 15px; }
        .qty-btn { width: 38px; height: 38px; border: none; border-radius: 10px; background: #fff; color: var(--primary); font-weight: 900; font-size: 20px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .history-card { background: #fff; border-radius: 22px; padding: 20px; margin: 15px; box-shadow: var(--shadow); border-right: 6px solid var(--primary); }
        .order-info-box { background: #fdfdfd; padding: 12px; border-radius: 12px; margin-top: 10px; font-size: 12px; line-height: 1.6; border: 1px solid #f0f0f0; }

        /* UI Helpers */
        #zoomOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .floating-cart-bar { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--primary); height: 60px; border-radius: 50px; display: none; align-items: center; justify-content: space-between; padding: 0 25px; color: white; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px; z-index: 1001; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #bbb; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<!-- شاشة وضع عدم الاتصال -->
<div id="offline-screen">
    <div style="font-size: 70px;">📶</div>
    <h2 style="font-weight: 900; color: var(--primary);">رجاء الاتصال بالانترنت 😍</h2>
    <p style="color: #666; margin-top: 10px;">لا يمكننا تحميل الموبايلات بدون نت</p>
    <button onclick="location.reload()" style="margin-top: 20px; padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800;">تحديث الصفحة</button>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div id="zoomOverlay" onclick="this.style.display='none'"><img id="zoomImg" style="max-width:90%; border-radius:15px;"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="side-profile">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" id="side-avatar">
        <h3 id="side-name">زائر iMoby</h3>
        <p id="side-phone">سجل طلبك الأول</p>
    </div>
    <div class="side-menu">
        <div class="side-link" onclick="showPage('shop'); toggleSidebar()">🏠 الرئيسية</div>
        <div class="side-link" onclick="showPage('offers'); toggleSidebar()">🔥 العروض</div>
        <div class="side-link" onclick="showPage('account'); toggleSidebar()">📦 طلباتي</div>
        <div class="side-link" onclick="window.open('https://wa.me/XXXXXXXX')">💬 واتساب</div>
    </div>
    <div class="side-footer"><span style="font-size:11px; color:#bbb;">V 3.0.0 Stable</span></div>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeDetails()">
    <div class="bottom-sheet" id="detailsSheet" onclick="event.stopPropagation()">
        <div onclick="closeDetails()" style="position:absolute; left:20px; top:20px; font-weight:900; background:#eee; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">✕</div>
        <div id="detailsContent"></div>
    </div>
</div>

<header>
    <div onclick="toggleSidebar()" style="font-size:26px; cursor: pointer;">☰</div>
    <h1 style="font-weight:900;">iMoby</h1>
    <div onclick="showPage('cart')" style="font-size:24px; position:relative;">🛒<span id="top-count" style="position:absolute; top:-5px; right:-8px; background:var(--accent); color:var(--primary); font-size:10px; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900;">0</span></div>
</header>

<div class="filter-container" id="filter-container">
    <div class="search-wrapper"><input type="text" id="searchInput" class="search-box" placeholder="ابحث عن موبايلك..." oninput="render()"></div>
    <div class="filter-scroll">
        <select id="priceSort" class="f-pill" onchange="render()"><option value="none">ترتيب السعر</option><option value="low">الأقل سعرًا ↑</option><option value="high">الأعلى سعرًا ↓</option></select>
        <select id="timeSort" class="f-pill" onchange="render()"><option value="new">الأحدث</option><option value="old">الأقدم</option></select>
        <div class="f-pill active brand-btn" onclick="filterBrand('الكل', this)">الكل</div>
        <div class="f-pill brand-btn" onclick="filterBrand('ايفون', this)">ايفون</div>
        <div class="f-pill brand-btn" onclick="filterBrand('سامسونج', this)">سامسونج</div>
    </div>
</div>

<div id="shop-page" class="page active"><div id="product-list"></div></div>
<div id="offers-page" class="page"><h3 style="padding:20px;">عروض حصرية 🔥</h3><div id="offers-list"></div></div>

<div id="cart-page" class="page">
    <h3 style="padding:20px;">السلة 🛍️</h3>
    <div id="cart-items-list"></div>
    <div id="checkout-form" style="display:none; padding:15px;">
        <div style="background:white; padding:25px; border-radius:25px; box-shadow:var(--shadow);">
            <input type="text" id="cust-name" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #eee;" placeholder="الاسم">
            <input type="tel" id="cust-phone" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #eee;" placeholder="رقم الهاتف">
            <input type="text" id="cust-address" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #eee;" placeholder="العنوان بالتفصيل">
            <button onclick="confirmOrderPopup()" style="width:100%; padding:20px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:900;">تأكيد الشراء</button>
        </div>
    </div>
</div>

<div id="account-page" class="page"><h3 style="padding:20px;">طلباتي 👤</h3><div id="history-list"></div></div>

<div class="floating-cart-bar" id="floatingCart" onclick="showPage('cart')">
    <div style="display:flex; align-items:center; gap:12px;"><span id="f-count" style="background:var(--accent); color:var(--primary); padding:3px 12px; border-radius:20px; font-weight:900;">0</span><b>منتج بالسلة</b></div>
    <div style="font-weight:900; font-size:18px;" id="f-total">0 ج.م</div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" id="nav-shop" onclick="showPage('shop')">🏠<span>الرئيسية</span></div>
    <div class="nav-item" id="nav-offers" onclick="showPage('offers')">🔥<span>العروض</span></div>
    <div class="nav-item" id="nav-cart" onclick="showPage('cart')">🛒<span>السلة</span></div>
    <div class="nav-item" id="nav-acc" onclick="showPage('account')">👤<span>طلباتي</span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const configL = { apiKey: "AIzaSyC9NC7ePbfrqR8cJi5GhzmulK9gZgkLbcQ", databaseURL: "https://loho-4a060-default-rtdb.firebaseio.com" };
    const configH = { apiKey: "AIzaSyCr4T8GLRxtf_6LNrokjKvmBOwSkuGO5yQ", databaseURL: "https://hamsa-6009e-default-rtdb.firebaseio.com" };

    const dbL = getDatabase(initializeApp(configL, "L"));
    const dbH = getDatabase(initializeApp(configH, "H"));

    // فحص الإنترنت
    function checkStatus() {
        if(!navigator.onLine) {
            document.getElementById('offline-screen').style.display = 'flex';
        } else {
            document.getElementById('offline-screen').style.display = 'none';
        }
    }
    window.addEventListener('online', checkStatus);
    window.addEventListener('offline', checkStatus);
    checkStatus();

    onValue(ref(dbL, 'products'), (snap) => {
        const data = snap.val();
        if(data) { window.allProducts = Object.keys(data).map(k => ({ id: k, ...data[k] })); window.render(); }
    });

    window.onload = () => {
        checkStatus();
        const savedPhone = localStorage.getItem('imoby_user_phone');
        if(savedPhone) fetchHistoryByPhone(savedPhone);
    };

    function fetchHistoryByPhone(phone) {
        const ordersQuery = query(ref(dbH, 'orders'), orderByChild('customer_phone'), equalTo(phone));
        onValue(ordersQuery, (snapshot) => {
            const data = snapshot.val();
            if(data) {
                const orders = Object.values(data).reverse();
                const lastOrder = orders[0];
                document.getElementById('side-name').innerText = lastOrder.customer_name;
                document.getElementById('side-phone').innerText = lastOrder.customer_phone;
                document.getElementById('cust-name').value = lastOrder.customer_name;
                document.getElementById('cust-phone').value = lastOrder.customer_phone;
                document.getElementById('cust-address').value = lastOrder.customer_address;
                
                document.getElementById('history-list').innerHTML = orders.map(o => `
                    <div class="history-card">
                        <div style="display:flex; justify-content:space-between; border-bottom:1px dashed #eee; padding-bottom:10px;"><b>طلب ${o.orderId}</b><span style="color:green; font-weight:800;">${o.status}</span></div>
                        <div style="margin:10px 0; font-size:13px;">${o.items.map(i => `• ${i.title} (x${i.qty})`).join('<br>')}</div>
                        <div class="order-info-box">👤 <b>الاسم:</b> ${o.customer_name}<br>📞 <b>الهاتف:</b> ${o.customer_phone}<br>📍 <b>العنوان:</b> ${o.customer_address}<br>📅 <b>الوقت:</b> ${o.date}</div>
                        <div style="text-align:left; font-weight:900; font-size:18px; color:var(--primary); margin-top:10px;">الإجمالي: ${o.total}</div>
                    </div>`).join('');
            }
        });
    }

    // رسالة تأكيد احترافية
    window.confirmOrderPopup = function() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const addr = document.getElementById('cust-address').value;

        if(!name || !phone || !addr) {
            Swal.fire({ icon: 'warning', title: 'عذراً', text: 'يرجى إكمال جميع البيانات', confirmButtonText: 'حسناً', confirmButtonColor: '#6e1414' });
            return;
        }

        Swal.fire({
            title: 'تأكيد الشراء',
            text: "هل تريد إرسال الطلب الآن؟",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#6e1414',
            cancelButtonColor: '#d33',
            confirmButtonText: 'نعم، أرسل الطلب',
            cancelButtonText: 'تراجع'
        }).then((result) => {
            if (result.isConfirmed) {
                sendOrder(name, phone, addr);
            }
        });
    }

    function sendOrder(name, phone, addr) {
        const orderData = { 
            orderId: "#IM"+Math.floor(1000+Math.random()*9000), customer_name: name, customer_phone: phone, customer_address: addr,
            total: document.getElementById('f-total').innerText, items: Object.values(window.cart), status: "قيد المراجعة", date: new Date().toLocaleString('ar-EG') 
        };

        set(push(ref(dbH, 'orders')), orderData).then(() => {
            localStorage.setItem('imoby_user_phone', phone);
            window.cart = {}; updateUI(); fetchHistoryByPhone(phone); showPage('account');
            Swal.fire({ icon: 'success', title: 'تم الطلب بنجاح', text: 'سيتم التواصل معك قريباً 😍', confirmButtonColor: '#6e1414' });
        });
    }
</script>

<script>
    window.allProducts = []; window.cart = {}; window.currentBrand = 'الكل';

    window.render = function() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const pSort = document.getElementById('priceSort').value;
        const tSort = document.getElementById('timeSort').value;

        let f = window.allProducts.filter(p => (window.currentBrand === 'الكل' || p.brand === window.currentBrand) && p.title.toLowerCase().includes(q));
        if(pSort === 'low') f.sort((a,b) => a.price - b.price); else if(pSort === 'high') f.sort((a,b) => b.price - a.price);
        if(tSort === 'new') f.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

        let h = ''; f.forEach(p => {
            const qty = window.cart[p.id]?.qty || 0;
            const out = Number(p.stock || 0) <= 0;
            h += `<div class="card-item">
                <img src="${p.image}" class="product-img">
                <div style="flex:1">
                    <h3 style="font-size:14px; margin-bottom:5px;">${p.title}</h3>
                    <b style="color:var(--primary);">${Number(p.price).toLocaleString()} ج</b>
                    <span onclick='openDetails(${JSON.stringify(p)})' style="display:block; font-size:11px; color:var(--accent); margin-top:5px; cursor:pointer;">المواصفات ←</span>
                </div>
                <div class="card-actions">
                    ${out ? '<small style="color:red; font-weight:800;">نفذ</small>' : `<div class="qty-controls"><button class="qty-btn" onclick="updateQty('${p.id}',1,${p.price},'${p.title}','${p.image}')">+</button><span style="font-weight:900; width:15px; text-align:center;">${qty}</span><button class="qty-btn" onclick="updateQty('${p.id}',-1,${p.price},'${p.title}','${p.image}')">-</button></div>`}
                </div>
            </div>`;
        });
        document.getElementById('product-list').innerHTML = h;
    }

    window.updateQty = (id, d, p, t, img) => {
        if(!window.cart[id]) window.cart[id] = {id, qty:0, price:p, title:t, image:img};
        window.cart[id].qty = Math.max(0, window.cart[id].qty + d);
        if(window.cart[id].qty === 0) delete window.cart[id];
        updateUI(); 
        render(); 
        if(document.getElementById('cart-page').classList.contains('active')) renderCart();
    }

    function updateUI() {
        let c=0, t=0; Object.values(window.cart).forEach(i=>{c+=i.qty; t+=(i.qty*i.price);});
        document.getElementById('top-count').innerText = c;
        document.getElementById('f-count').innerText = c;
        document.getElementById('f-total').innerText = t.toLocaleString() + " ج.م";
        const isHome = document.getElementById('shop-page').classList.contains('active');
        document.getElementById('floatingCart').style.display = (c > 0 && isHome) ? 'flex' : 'none';
    }

    window.openDetails = (p) => {
        const out = Number(p.stock || 0) <= 0;
        let specs = Object.entries(p).filter(([k,v]) => !['id','image','title','price','stock','brand','timestamp','isOffer'].includes(k) && v)
            .map(([k,v]) => `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f5f5f5; font-size:13px;"><span>${k}</span><b>${v}</b></div>`).join('');
        
        document.getElementById('detailsContent').innerHTML = `
            <div class="sheet-gallery">
                <img src="${p.image}" onclick="zoomImg('${p.image}')">
                <img src="${p.image}" style="opacity:0.6" onclick="zoomImg('${p.image}')">
                <img src="${p.image}" style="opacity:0.3" onclick="zoomImg('${p.image}')">
            </div>
            <div style="text-align:center;">
                <h2 style="font-weight:900;">${p.title}</h2>
                <div style="color:var(--primary); font-size:22px; font-weight:900; margin-top:5px;">${Number(p.price).toLocaleString()} ج.م</div>
                ${out ? '<p style="color:red; font-weight:800; margin:10px 0;">⚠️ هذا المنتج نفذ حالياً من المخزن</p>' : '<p style="color:green; font-size:12px; margin-top:5px;">متوفر الآن في المخزن ✅</p>'}
            </div>
            <div style="margin-top:20px; background:#f9f9f9; padding:15px; border-radius:20px;">
                <h4 style="margin-bottom:10px;">المواصفات التقنية:</h4>
                ${specs || 'لا توجد مواصفات إضافية'}
            </div>
            ${!out ? `<button onclick="updateQty('${p.id}',1,${p.price},'${p.title}','${p.image}'); closeDetails();" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:15px; margin-top:20px; font-weight:900;">إضافة إلى السلة</button>` : ''}
        `;
        document.getElementById('sheetOverlay').style.display = 'flex';
        setTimeout(() => document.getElementById('detailsSheet').classList.add('show'), 10);
    }

    window.zoomImg = (s) => { document.getElementById('zoomImg').src = s; document.getElementById('zoomOverlay').style.display = 'flex'; }
    window.closeDetails = () => { document.getElementById('detailsSheet').classList.remove('show'); setTimeout(() => document.getElementById('sheetOverlay').style.display='none', 400); }
    window.toggleSidebar = () => { const s = document.getElementById('sidebar'); const o = document.getElementById('overlay'); s.classList.toggle('active'); o.style.display = s.classList.contains('active')?'block':'none'; }

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id + '-page').classList.add('active');
        document.getElementById('nav-' + (id==='account'?'acc':id)).classList.add('active');
        document.getElementById('filter-container').style.display = (id === 'shop') ? 'block' : 'none';
        if(id === 'cart') renderCart();
        window.scrollTo(0,0); updateUI();
    }

    function renderCart() {
        const items = Object.values(window.cart);
        document.getElementById('checkout-form').style.display = items.length ? 'block' : 'none';
        document.getElementById('cart-items-list').innerHTML = items.map(i => `
            <div class="card-item">
                <img src="${i.image}" style="width:50px; border-radius:8px;">
                <div style="flex:1">
                    <b style="font-size:13px;">${i.title}</b><br>
                    <small style="color:var(--primary); font-weight:700;">${(i.qty * i.price).toLocaleString()} ج</small>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="updateQty('${i.id}',1,${i.price},'${i.title}','${i.image}')">+</button>
                    <span style="font-weight:900; width:15px; text-align:center;">${i.qty}</span>
                    <button class="qty-btn" onclick="updateQty('${i.id}',-1,${i.price},'${i.title}','${i.image}')">-</button>
                </div>
            </div>`).join('') || '<p style="text-align:center; padding:50px; opacity:0.5; font-weight:800;">السلة فارغة حالياً</p>';
    }

    window.filterBrand = (b, btn) => { window.currentBrand = b; document.querySelectorAll('.brand-btn').forEach(x => x.classList.remove('active')); btn.classList.add('active'); render(); }
</script>
</body>
</html>
